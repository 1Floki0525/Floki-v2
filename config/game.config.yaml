schema_version: floki-v2-core-brain-config-v1
mode: game

models:
  cognition:
    provider: ollama
    model_env: FLOKI_COGNITION_MODEL
    model_default: qwen3.5:9b
    endpoint_env: FLOKI_COGNITION_ENDPOINT
    endpoint_default: http://127.0.0.1:11434
    temperature: 0.55
    top_p: 0.9
    timeout_ms: 120000
    keep_alive: 24h

  vision:
    provider: ollama
    model_env: FLOKI_VISION_MODEL
    model_default: qwen3-vl:4b
    endpoint_env: FLOKI_VISION_ENDPOINT
    endpoint_default: http://127.0.0.1:11435
    enabled_now: false
    mode_scope: game_world_first_person_only
    temperature: 0.2
    top_p: 0.8
    timeout_ms: 120000
    keep_alive: 24h

modules:
  thalamus:
    enabled: true
    required: true

  temporal:
    enabled: true
    required: true

  amygdala:
    enabled: true
    required: true

  emotions_base:
    enabled: true
    required: true

  hippocampus:
    enabled: true
    required: true

  personality:
    enabled: true
    required: true

  pineal:
    enabled: true
    required: true

  frontal:
    enabled: true
    required: true

  broca:
    enabled: true
    required: true

  chat_world_senses:
    enabled: false
    required: false

  chat_world_vision:
    enabled: false
    required: false

  chat_world_hearing:
    enabled: false
    required: false

  game_world_eyes:
    enabled: false
    required: false

  game_world_body:
    enabled: false
    required: false

policies:
  minecraft_enabled_now: false
  body_enabled_now: false
  game_world_eyes_enabled_now: false
  usb_camera_as_game_world_eyes: false
  chat_world_camera_detection_enabled_now: false
  chat_world_vision_enabled_now: false
  raw_private_reasoning_storage: false


embodiment:
  realm_name: minecraft_home_realm
  realm_description: floki_native_minecraft_incarnation
  body_source: minecraft_player_avatar
  eyes_source: minecraft_first_person_view
  ears_source: minecraft_game_events_and_chat
  voice_source: minecraft_chat_interface
  speech_to_text_engine: none
  object_vision_engine: future_minecraft_first_person_detector
  voice_activity_engine: none
  text_to_speech_engine: minecraft_chat
  voice_locale: none
  voice_profile: in_game_chat
  voice_model_size: none
  runtime_enabled_now: false
