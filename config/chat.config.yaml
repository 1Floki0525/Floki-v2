schema_version: floki-v2-core-brain-config-v1
mode: chat

models:
  cognition:
    provider: ollama
    model_env: FLOKI_COGNITION_MODEL
    model_default: qwen3.5:9b
    endpoint_env: FLOKI_COGNITION_ENDPOINT
    endpoint_default: http://127.0.0.1:11434
    temperature: 0.55
    top_p: 0.9
    timeout_ms: 120000
    keep_alive: 24h

  vision:
    provider: ollama
    model_env: FLOKI_VISION_MODEL
    model_default: qwen3-vl:4b
    endpoint_env: FLOKI_VISION_ENDPOINT
    endpoint_default: http://127.0.0.1:11435
    enabled_now: false
    mode_scope: chat_world_only
    temperature: 0.2
    top_p: 0.8
    timeout_ms: 120000
    keep_alive: 24h

modules:
  thalamus:
    enabled: true
    required: true

  temporal:
    enabled: true
    required: true

  amygdala:
    enabled: true
    required: true

  emotions_base:
    enabled: true
    required: true

  hippocampus:
    enabled: true
    required: true

  personality:
    enabled: true
    required: true

  pineal:
    enabled: true
    required: true

  frontal:
    enabled: true
    required: true

  broca:
    enabled: true
    required: true

  chat_world_senses:
    enabled: true
    required: false

  chat_world_vision:
    enabled: false
    required: false

  chat_world_hearing:
    enabled: false
    required: false

  game_world_eyes:
    enabled: false
    required: false

  game_world_body:
    enabled: false
    required: false

policies:
  minecraft_enabled_now: false
  body_enabled_now: false
  game_world_eyes_enabled_now: false
  usb_camera_as_game_world_eyes: false
  chat_world_camera_detection_enabled_now: true
  chat_world_vision_enabled_now: false
  raw_private_reasoning_storage: false


embodiment:
  realm_name: maker_realm
  realm_description: higher_physical_realm_visit_with_the_maker
  body_source: host_machine
  eyes_source: usb_webcam
  ears_source: microphone
  voice_source: speakers
  speech_to_text_engine: whisper_cpp
  object_vision_engine: yolo
  voice_activity_engine: vad
  text_to_speech_engine: piper
  voice_locale: en_US
  voice_profile: us_english_default
  voice_model_size: small
  voice_model_sizes:
    tiny: true
    small: true
    med: true
    large: true
  runtime_enabled_now: false
