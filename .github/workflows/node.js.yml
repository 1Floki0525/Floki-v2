name: Floki-v2 Node 24 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: floki-v2-node24-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Validate checked-out release inputs
        shell: bash
        run: |
          test -f package-lock.json
          test -f apps/floki-neural-interface/package-lock.json
          test -f config/chat.config.yaml.temp
          test -f config/game.config.yaml.temp
          test -f bin/floki-prepare-ci-config.cjs
          test -x bin/floki-node24-run.sh
          test -x bin/floki-build.sh

      - name: Prepare runner-portable configuration
        shell: bash
        run: node bin/floki-prepare-ci-config.cjs

      - name: Verify Node 24 requirement
        shell: bash
        run: |
          bash bin/floki-node24-run.sh node --version
          bash bin/floki-node24-run.sh npm --version

      - name: Verify RSI training Python compiles
        shell: bash
        run: |
          python3 -m py_compile containers/self-improvement-training/train_qlora.py
          echo FLOKI_V2_TRAINING_PY_COMPILE_OK

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install neural-interface dependencies
        run: npm --prefix apps/floki-neural-interface ci --no-audit --no-fund

      - name: Build neural interface
        run: npm run build

      - name: Run contract tests
        shell: bash
        run: |
          status=0
          npm test 2>&1 | tee "$RUNNER_TEMP/floki-contract-tests.log" || status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            echo
            echo "===== FLOKI CONTRACT TEST FAILURE CONTEXT ====="
            tail -n 250 "$RUNNER_TEMP/floki-contract-tests.log"
            exit "$status"
          fi
