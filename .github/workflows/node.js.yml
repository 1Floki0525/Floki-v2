name: Floki-v2 Node 24 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: floki-v2-node24-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Validate checked-out release inputs
        shell: bash
        run: |
          test -f package-lock.json
          test -f apps/floki-neural-interface/package-lock.json
          test -f config/chat.config.yaml.temp
          test -f config/game.config.yaml.temp
          test -x bin/floki-node24-run.sh
          test -x bin/floki-build.sh

      - name: Prepare public configuration
        shell: bash
        run: |
          cp config/chat.config.yaml.temp config/chat.config.yaml
          cp config/game.config.yaml.temp config/game.config.yaml

      - name: Verify Node 24 requirement
        shell: bash
        run: |
          bash bin/floki-node24-run.sh
          node --version
          npm --version

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install neural-interface dependencies
        run: npm --prefix apps/floki-neural-interface ci --no-audit --no-fund

      - name: Build neural interface
        run: npm run build

      - name: Run contract tests
        run: npm test
