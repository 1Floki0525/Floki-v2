name: Floki-v2 Node 24 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: floki-v2-node24-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/floki-neural-interface/package-lock.json

      - name: Prepare public configuration
        run: |
          cp config/chat.config.yaml.temp config/chat.config.yaml
          cp config/game.config.yaml.temp config/game.config.yaml

      - name: Verify Node 24 requirement
        run: bash bin/floki-node24-run.sh

      - name: Install root dependencies
        run: npm ci

      - name: Install neural-interface dependencies
        run: npm --prefix apps/floki-neural-interface ci

      - name: Build neural interface
        run: npm run build

      - name: Run contract tests
        run: npm test
